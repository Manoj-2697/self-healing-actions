name: Self Healing Agent

on:
  workflow_run:
    workflows: ["Python Tests", "AWS Deployment"]
    types: [completed]

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  heal:
    name: AI Self-Correction Cycle
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository context
        uses: actions/checkout@v4
        with:
          # Use the branch that failed, from the workflow_run event
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Configure Healer Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install google-generativeai requests pandas # Healer needs requests, but codebase uses pandas

      - name: Gemini AI Healing Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEALER_PAT: ${{ secrets.HEALER_PAT }}
          # Important: pass the FAILED_RUN_ID correctly
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          python .github/scripts/healer.py
