name: AI-Driven ETL Self-Healing Pipeline

on:
  push:
    branches: [ master, 'gemini-fix-*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  repository_dispatch:
    types: [verify-fix]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  Verify-Data-Pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize Project Context
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}

      - name: Configure Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ETL Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Execute ETL Operations
        id: etl_run
        env:
          PYTHONPATH: src
        run: |
          python src/main.py

      - name: Verified PR Finalization
        # Only finalize if we're on a fix branch and previous steps succeeded
        if: startsWith(github.ref, 'refs/heads/gemini-fix-') && success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[Verification Success] Triggering final PR creation..."
          python .github/scripts/finalize_pr.py

#      - name: Initialize Infrastructure (Terraform)
#        working-directory: ./terraform
#        env:
#          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
#          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#        run: |
#          terraform init
#          terraform plan
#
#      - name: Deploy Infrastructure (Terraform)
#        if: github.ref == 'refs/heads/master' && success()
#        working-directory: ./terraform
#        env:
#          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
#          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#        run: |
#          terraform apply -auto-approve

  AI-Resilient-Healing:
    runs-on: ubuntu-latest
    needs: Verify-Data-Pipeline
    if: always() && needs.Verify-Data-Pipeline.result == 'failure'
    steps:
      - name: Fetch Global Repository Context
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Healer Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI Core Dependencies
        run: |
          python -m pip install google-generativeai requests

      - name: Gemini AI Self-Correction Cycle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEALER_PAT: ${{ secrets.HEALER_PAT }}
        run: |
          python .github/scripts/healer.py
