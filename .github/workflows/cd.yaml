name: CI/CD Pipeline (Wrapper)

on:
  push:
    branches: [ master, 'gemini-fix-*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  python-tests:
    uses: ./.github/workflows/python-tests.yml
    secrets: inherit

  aws-deployment:
    needs: [ python-tests ]
    if: success()
    uses: ./.github/workflows/aws-deployment.yml
    secrets: inherit

  self-healing:
    needs: [ python-tests, aws-deployment ]
    if: |
      always() &&
      (needs.python-tests.result == 'failure' || needs.aws-deployment.result == 'failure') &&
      needs.aws-deployment.outputs.credentials_failed != 'true'
    uses: ./.github/workflows/self-healing-agent.yml
    with:
      branch: ${{ github.ref_name || github.head_ref }}
      python_failed: ${{ needs.python-tests.result == 'failure' }}
      terraform_failed: ${{ needs.aws-deployment.result == 'failure' }}
    secrets: inherit
