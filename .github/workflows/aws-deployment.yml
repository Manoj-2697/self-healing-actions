name: AWS Deployment (Core)

on:
  workflow_call:
    outputs:
      credentials_failed:
        description: "True if the job failed due to AWS credential validation"
        value: ${{ jobs.validate-credentials.outputs.credentials_failed }}

jobs:
  validate-credentials:
    name: Validate AWS Credentials
    runs-on: ubuntu-latest
    outputs:
      credentials_failed: ${{ steps.cred_check.outputs.credentials_failed }}
    steps:
      - name: Sync System Clock (Prevent Signature Skew)
        run: |
          sudo apt-get install -y ntpdate 2>/dev/null || true
          sudo ntpdate -u pool.ntp.org || sudo timedatectl set-ntp true
          echo "Current time: $(date -u)"

      - name: Configure AWS Credentials
        id: configure_aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate AWS Credentials
        id: cred_check
        run: |
          if aws sts get-caller-identity; then
            echo "✅ Credentials are VALID."
            echo "credentials_failed=false" >> $GITHUB_OUTPUT
          else
            echo "❌ CREDENTIAL VALIDATION FAILED. Stopping deployment."
            echo "credentials_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: [ validate-credentials ]
    # Only run if credentials are confirmed valid
    if: needs.validate-credentials.outputs.credentials_failed == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master'
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: terraform apply -auto-approve
