name: AWS Deployment (Core)

on:
  workflow_call:
    outputs:
      credentials_failed:
        description: "True if the job failed due to AWS credential validation"
        value: ${{ jobs.validate-credentials.outputs.credentials_failed }}

jobs:
  validate-credentials:
    name: Validate AWS Credentials
    runs-on: ubuntu-latest
    outputs:
      credentials_failed: ${{ steps.cred_check.outputs.credentials_failed }}
    steps:
      - name: Verify Required Secrets Are Present
        env:
          # Load secrets into env vars so we can check length without printing values.
          # GitHub will automatically mask these in logs.
          _KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          _SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          _REGION: ${{ secrets.AWS_REGION }}
        run: |
          MISSING=()
          [ -z "$_KEY_ID" ]  && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "$_SECRET" ]  && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "$_REGION" ]  && MISSING+=("AWS_REGION")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ The following required secrets are NOT set in GitHub:"
            for s in "${MISSING[@]}"; do echo "   - $s"; done
            echo ""
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required secrets are present."


      - name: Configure AWS Credentials
        id: configure_aws
        continue-on-error: true  # Let next step capture the failure
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate AWS Credentials
        id: cred_check
        run: |
          # If the configure step itself failed, mark as credential error immediately
          if [ "${{ steps.configure_aws.outcome }}" != "success" ]; then
            echo "❌ AWS credential configuration failed (SignatureDoesNotMatch or similar)."
            echo "credentials_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Double-check with a live STS call
          if aws sts get-caller-identity; then
            echo "✅ Credentials are VALID."
            echo "credentials_failed=false" >> $GITHUB_OUTPUT
          else
            echo "❌ CREDENTIAL VALIDATION FAILED. Stopping deployment."
            echo "credentials_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: [ validate-credentials ]
    # Only run if credentials are confirmed valid
    if: needs.validate-credentials.outputs.credentials_failed == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: |
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/test-branch'
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: terraform apply -auto-approve tfplan
